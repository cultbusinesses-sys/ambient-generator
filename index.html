<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate infinite ambient music with evolving visuals. No login required.">
  <title>Ambient Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/layout.css">

  <script>
    /**
     * IMPORTANT — set this to your Railway server URL after deployment.
     * Example: window.AMBIENT_SERVER_URL = 'https://ambient-generator.railway.app';
     * Leave empty string '' to use local browser rendering (slow for long durations).
     */
    window.AMBIENT_SERVER_URL = '';
  </script>

  <style>
    /* ── Index-specific overrides ── */

    /* Canvas module label — absolute inside .canvas-wrap */
    .canvas-module-label {
      position:    absolute;
      bottom:      12px;
      left:        14px;
      font-size:   9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color:       rgba(255,255,255,.3);
      pointer-events: none;
      user-select: none;
    }

    /* Progress section — hidden by default, shown by JS */
    .zone-progress {
      display: none;
      margin-bottom: 16px;
    }

    /* Status bar row */
    .zone-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-lg);
      margin-bottom: 16px;
      min-height: 42px;
      flex-wrap: wrap;
    }

    /* Config desc takes remaining space */
    #config-desc {
      flex: 1;
      text-align: right;
    }

    /* Section headers inside control zones */
    .zone-controls,
    .zone-middle,
    .zone-download {
      margin-bottom: 16px;
    }

    /* Audio player shown after generate */
    #audio-preview {
      display: none;
      width: 100%;
      margin-top: 10px;
      filter: invert(1);
      border-radius: var(--r-md);
    }

    /* Log area */
    .app-log {
      max-height: 150px;
    }

    /* Sub text in header */
    .app-header .sub {
      font-size: 12px;
      color: var(--gray);
      font-weight: 400;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── Header ────────────────────────────────────────────── -->
  <header class="app-header">
    <span class="eyebrow">Ambient Generator</span>
    <h1>Infinite Ambient Music</h1>
    <p class="sub">Evolving ambient music with looping visuals. Download audio or video — no login.</p>
  </header>

  <main class="app-main">

    <!-- ── Visual Canvas ─────────────────────────────────── -->
    <section class="zone-canvas" style="margin-bottom:16px">
      <div class="canvas-wrap">
        <canvas id="main-canvas"></canvas>
        <div class="canvas-module-label" id="canvas-module-label">No visual loaded</div>
      </div>
    </section>

    <!-- ── Status Bar ────────────────────────────────────── -->
    <section class="zone-status">
      <div class="state-badge" id="state-badge">Idle</div>
      <div class="status-text" id="status-text">Ready to generate</div>
      <div class="config-desc" id="config-desc"></div>
    </section>

    <!-- ── Progress ──────────────────────────────────────── -->
    <section class="zone-progress" id="progress-bar">
      <span class="progress-label" id="progress-label">Generating</span>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <!-- ── Top Controls ──────────────────────────────────── -->
    <section class="zone-controls">

      <!-- Duration -->
      <div class="ctrl-group">
        <span class="section-label">Duration</span>
        <div class="btn-group">
          <button class="sel-btn active" data-duration="5m">5 min</button>
          <button class="sel-btn"        data-duration="15m">15 min</button>
          <button class="sel-btn"        data-duration="30m">30 min</button>
          <button class="sel-btn"        data-duration="1hr">1 hr</button>
          <button class="sel-btn"        data-duration="3hr">3 hr</button>
          <button class="sel-btn"        data-duration="5hr">5 hr</button>
          <button class="sel-btn"        data-duration="custom">Custom</button>
        </div>
        <input
          id="dur-custom"
          type="number"
          min="1"
          max="600"
          placeholder="Minutes"
          style="display:none;width:130px;margin-top:8px"
          aria-label="Custom duration in minutes"
        >
      </div>

      <!-- Generate -->
      <div class="ctrl-group">
        <span class="section-label">Generate</span>
        <div class="gen-row">
          <button class="btn btn-primary" id="btn-generate">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor">
              <polygon points="2,1 10,5.5 2,10"/>
            </svg>
            Generate Music
          </button>
          <button class="btn" id="btn-random">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 3h2l5 5h2M1 8h2l2-2M9 1l2 2-2 2"/>
            </svg>
            Random Generate
          </button>
        </div>
      </div>

    </section>

    <!-- ── Middle Controls ───────────────────────────────── -->
    <section class="zone-middle">

      <!-- Visual Style -->
      <div class="ctrl-group">
        <span class="section-label">Visual Style</span>
        <div class="btn-group">
          <button class="sel-btn active" data-visual="wave">Wave Flow</button>
          <button class="sel-btn"        data-visual="particle">Particle Field</button>
          <button class="sel-btn"        data-visual="illusion">Illusion Field</button>
          <button class="sel-btn"        data-visual="tunnel">Tunnel</button>
          <button class="sel-btn"        data-visual="plasma">Plasma</button>
          <button class="sel-btn"        data-visual="starfield">Starfield</button>
          <button class="sel-btn"        data-visual="fractal">Fractal</button>
          <button class="sel-btn"        data-visual="nebula">Nebula</button>
        </div>
      </div>

      <!-- Resolution -->
      <div class="ctrl-group" style="margin-top:16px">
        <span class="section-label">Video Resolution</span>
        <div class="btn-group">
          <button class="sel-btn active" data-resolution="720p">720p</button>
          <button class="sel-btn"        data-resolution="1080p">1080p</button>
          <button class="sel-btn"        data-resolution="2k">2K</button>
          <button class="sel-btn"        data-resolution="4k">4K</button>
        </div>
      </div>

    </section>

    <!-- ── Download ──────────────────────────────────────── -->
    <section class="zone-download">
      <span class="section-label">Download</span>

      <div class="dl-row">
        <button class="btn" id="btn-dl-audio" disabled>
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5.5 1v7M2.5 5.5l3 3 3-3M1 9.5h9"/>
          </svg>
          Download WAV
        </button>
        <button class="btn" id="btn-dl-audio-mp3" disabled>
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5.5 1v7M2.5 5.5l3 3 3-3M1 9.5h9"/>
          </svg>
          Download MP3
        </button>
        <button class="btn btn-primary" id="btn-dl-video" disabled>
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="2.5" width="7" height="6" rx="1"/>
            <path d="M8 4.5l2.5-1.5v4L8 5.5"/>
          </svg>
          Download Video
        </button>
      </div>

      <!-- Audio preview player — shown after first generate -->
      <audio id="audio-preview" controls></audio>

    </section>

    <!-- ── Log ───────────────────────────────────────────── -->
    <section class="panel zone-log">
      <div class="panel-head">
        <span class="panel-label">Log</span>
        <div class="dot" id="log-dot"></div>
      </div>
      <div class="panel-body">
        <div class="app-log" id="app-log-display"></div>
      </div>
    </section>

  </main>
</div>

<!-- ── Bootstrap ─────────────────────────────────────────────── -->
<script type="module">
  import { UIController } from './js/ui/ui-controller.js';

  // ---------------------------------------------------------------------------
  // AppController — extends UIController with index.html-specific UI wiring
  // ---------------------------------------------------------------------------
  class AppController extends UIController {

    // Override: drive state badge, dot, progress visibility, audio player
    _showState(state) {
      super._showState(state);

      // State badge
      const badge = document.getElementById('state-badge');
      if (badge) {
        const labels = {
          idle: 'Idle', generating: 'Generating',
          ready: 'Ready', exporting: 'Exporting'
        };
        badge.textContent = labels[state] ?? state;
        badge.className   = `state-badge ${state}`;
      }

      // Log dot
      const dot = document.getElementById('log-dot');
      if (dot) {
        if (state === 'generating' || state === 'exporting') dot.className = 'dot run';
        else if (state === 'ready') dot.className = 'dot ok';
        else dot.className = 'dot';
      }

      // Progress bar section
      const pb = document.getElementById('progress-bar');
      if (pb) {
        pb.style.display = (state === 'generating' || state === 'exporting') ? 'block' : 'none';
      }

      // Progress label
      const pl = document.getElementById('progress-label');
      if (pl) pl.textContent = state === 'exporting' ? 'Exporting' : 'Generating';
    }

    // Override: write to the visible log panel
    _log(msg) {
      super._log(msg);
      const logEl = document.getElementById('app-log-display');
      if (!logEl) return;
      const now  = new Date();
      const ts   = `${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-ts">${ts}</span><span class="log-inf">${msg}</span>`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      while (logEl.children.length > 20) logEl.firstChild.remove();
    }

    // Override: update canvas label on visual switch
    async _switchVisual(name) {
      await super._switchVisual(name);
      this._updateCanvasLabel(name);
    }

    // Override: update canvas label after generate
    async _generate() {
      await super._generate();
      this._updateCanvasLabel(this._selectedVis);
    }

    _updateCanvasLabel(name) {
      const lbl = document.getElementById('canvas-module-label');
      if (!lbl) return;
      const labels = {
        wave: 'Wave Flow', particle: 'Particle Field', illusion: 'Illusion Field'
      };
      lbl.textContent = labels[name] ?? name;
    }
  }

  // Boot
  const app = new AppController();
  app.init();
  window._app = app;
  app._log('App ready — select a duration and press Generate Music');
</script>

</body>
</html>
